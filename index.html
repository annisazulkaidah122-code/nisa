    // ==========================================

    function simulateVirtualBKResponse(userInput) {
      const q = userInput.toLowerCase();
      if (q.includes("stres") || q.includes("cemas") || q.includes("ujian")) {
        return "Saya mengerti perasaanmu, menghadapi ujian memang sering membuat tegang. 🌸\n\nCobalah beberapa cara di bawah ini:\n- **Teknik Pomodoro**: Belajar 25 menit, lalu istirahat 5 menit untuk menyegarkan pikiran.\n- **Latihan Napas**: Tarik napas 4 detik, tahan 4 detik, embuskan perlahan dalam 4 detik.\n- **Tidur Cukup**: Istirahat adalah bagian penting dari mengkonsolidasikan memori pelajaran di otak.\n\nJangan memendam semuanya sendirian, ya. Guru BK di sekolah juga sangat senang membantumu mengatur jadwal belajar.";
      }
      if (q.includes("jurusan") || q.includes("kuliah") || q.includes("rekomendasi") || q.includes("karier")) {
        return "Memilih jurusan kuliah memang langkah besar yang menarik! 🎓\n\nMari gunakan rumus sederhana ini untuk membantumu memikirkan keputusan:\n1. **Minat**: Apa pelajaran atau kegiatan yang membuatmu lupa waktu saat mengerjakannya?\n2. **Bakat**: Bidang apa yang paling sering mendapat apresiasi positif dari guru atau teman-teman?\n3. **Prospek Massa Depan**: Riset profesi apa yang akan terus relevan dalam 5-10 tahun ke depan.\n\nKamu bisa mencoba **Kuis Minat Bakat** di menu sebelah untuk mendapat gambaran tipe kepribadianmu!";
      }
      if (q.includes("bullying") || q.includes("ejek") || q.includes("perundungan") || q.includes("nakal")) {
        return "Perundungan mencakup hal fisik, verbal, maupun cyber bullying sekecil apa pun **SAMA SEKALI TIDAK BOLEH DIBIARKAN**. 🛡\n\nLangkah konkrit yang harus kamu lakukan:\n- Sampaikan dengan asertif: 'Berhenti, aku tidak suka caramu memperlakukanku seperti itu!'\n- Catat bukti kejadiannya (screenshot bila itu di media sosial).\n- Melapor ke tim BK. BK Care adalah zona aman untuk membantumu menyelesaikan masalah ini secara rahasia dan aman demi melindungimu.";
      }
      return "Terima kasih sudah berbagi ceritamu kepada saya. Mendengar apa yang kamu rasakan adalah langkah awal yang sangat baik. 💖\n\nIngat, kamu tidak sendirian di sekolah ini. Segala tantangan akademis, kebingungan sosial, maupun kecemasan pribadi selalu memiliki jalan keluarnya masing-masing.\n\nTuliskan keluh kesahmu lebih lanjut agar kita bisa mencari jalan keluar terbaik secara perlahan.";
    }

    // Tab 1: Konseling AI
    function AisCounselorChat() {
      const [messages, setMessages] = useState([
        {
          id: "g-1",
          role: "assistant",
          content: "Halo! Saya **Sahabat BK AI**, asisten konseling virtualmu. 👋 ❤\n\nDi sini, kamu bisa bebas menceritakan apa saja secara rahasia: tentang beban pelajaran, stres ujian, pergaulan teman, bingung pilih jurusan kuliah, atau sekadar ingin didengarkan tanpa stigma.\n\nApa yang sedang mengganjal di pikiranmu hari ini?",
          timestamp: "08:00"
        }
      ]);
      const [input, setInput] = useState("");
      const [isTyping, setIsTyping] = useState(false);
      const chatEndRef = useRef(null);

      const handleSend = (e) => {
        e.preventDefault();
        if (!input.trim()) return;

        const userMsg = {
          id: Math.random().toString(),
          role: "user",
          content: input,
          timestamp: new Date().toLocaleTimeString("id", { hour: "2-digit", minute: "2-digit" })
        };

        setMessages((prev) => [...prev, userMsg]);
        setInput("");
        setIsTyping(true);

        // Simulasi balasan AI setelah 1.5 detik
        setTimeout(() => {
          const aiReply = {
            id: Math.random().toString(),
            role: "assistant",
            content: simulateVirtualBKResponse(userMsg.content),
            timestamp: new Date().toLocaleTimeString("id", { hour: "2-digit", minute: "2-digit" })
          };
          setMessages((prev) => [...prev, aiReply]);
          setIsTyping(false);
        }, 1500);
      };

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, isTyping]);

      return (
        <div className="bg-white rounded-2xl border border-slate-100 flex flex-col h-[520px] shadow-sm overflow-hidden">
          {/* Header */}
          <div className="px-5 py-4 bg-gradient-to-r from-emerald-600 to-teal-600 text-white flex items-center justify-between">
            <div className="flex items-center gap-2.5">
              <div className="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center">
                <SvgIcon name="Sparkles" className="w-5 h-5 text-yellow-300" />
              </div>
              <div>
                <h3 className="font-bold text-sm leading-none">Sahabat BK AI</h3>
                <span className="text-[10px] text-emerald-100">Konseling Tanggap 24/7</span>
              </div>
            </div>
            <button 
              onClick={() => setMessages([messages[0]])}
              className="text-xs bg-white/10 hover:bg-white/20 px-2.5 py-1.5 rounded-lg font-semibold transition-all"
            >
              Ulangi Percakapan
            </button>
          </div>

          {/* Messages */}
          <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50">
            {messages.map((m) => (
              <div key={m.id} className={`flex items-start gap-2.5 ${m.role === "assistant" ? "justify-start" : "justify-end"}`}>
                {m.role === "assistant" && (
                  <div className="w-7 h-7 rounded-full bg-emerald-100 text-emerald-700 text-[10px] font-bold flex items-center justify-center shrink-0">
                    BK
                  </div>
                )}
                <div className={`max-w-[80%] ${m.role === "assistant" ? "" : "order-1"}`}>
                  <div className={`p-3.5 rounded-2xl text-xs sm:text-sm leading-relaxed ${m.role === "assistant" ? "bg-white text-slate-800 border shadow-sm rounded-tl-none" : "bg-emerald-600 text-white rounded-tr-none"}`}>
                    <p className="whitespace-pre-line">{m.content}</p>
                  </div>
                  <span className="text-[9px] text-slate-400 mt-1 block px-1">{m.timestamp}</span>
                </div>
              </div>
            ))}

            {isTyping && (
              <div className="flex items-start gap-2.5">
                <div className="w-7 h-7 rounded-full bg-emerald-100 text-[10px] font-bold flex items-center justify-center">BK</div>
                <div className="bg-white px-4 py-2.5 border rounded-2xl shadow-sm rounded-tl-none text-xs text-slate-400 font-medium">
                  Sahabat BK sedang merangkai solusi...
                </div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>

          {/* Input */}
          <form onSubmit={handleSend} className="p-3 border-t bg-white flex gap-2">
            <input
              type="text"
              placeholder="Tulis keluh kesahmu (contoh: stres belajar, bingung jurusan, dll)..."
              value={input}
              onChange={(e) => setInput(e.target.value)}
              className="flex-1 bg-slate-50 border border-slate-200 text-xs px-4 py-3 rounded-xl outline-none focus:border-emerald-500 focus:bg-white transition-all"
            />
            <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white p-3 rounded-xl transition-all cursor-pointer">
              <SvgIcon name="Send" className="w-4 h-4" />
            </button>
          </form>
        </div>
      );
    }

                <h3 className="font-extrabold text-sm sm:text-base">Mengenal Lebih Dekat Sahabat BK</h3>
              </div>
              <div className="space-y-2.5">
                {GENERAL_FAQ.map((faq, i) => (
                  <div key={i} className="bg-slate-50 rounded-xl border border-slate-100 overflow-hidden">
                    <button
                      onClick={() => setOpenFaq(openFaq === i ? null : i)}
                      className="w-full text-left p-4 font-bold text-xs sm:text-sm text-slate-700 flex justify-between items-center cursor-pointer"
                    >
                      <span>{faq.q}</span>
                      <span>{openFaq === i ? "▲" : "▼"}</span>
                    </button>
                    {openFaq === i && (
                      <div className="px-4 pb-4 text-xs text-slate-500 leading-relaxed border-t border-slate-100 pt-2.5 bg-white">
                        {faq.a}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>

          </main>

          {/* Footer */}
          <footer className="mt-12 bg-slate-900 text-slate-400 py-8 px-4 border-t border-slate-800 text-center">
            <div className="max-w-7xl mx-auto text-xs space-y-2 select-none">
              <p className="font-bold text-white text-sm">Sahabat BK Digital Sekolah</p>
              <p>© {new Date().getFullYear()} Sahabat BK. Menggunakan Tailwind Play, React, dan Babel.</p>
              <span className="inline-block bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-0.5 rounded text-[10px] mt-2 font-bold uppercase">
                100% Secure & Privacy Guaranteed
              </span>
            </div>
          </footer>

        </div>
      );
    }

    // Render ke DOM
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

</body>
</html>
